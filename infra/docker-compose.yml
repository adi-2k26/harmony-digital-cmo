version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: harmony_cmo
      POSTGRES_USER: harmony
      POSTGRES_PASSWORD: harmony
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"

volumes:
  postgres_data:
